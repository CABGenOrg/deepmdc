sequence_embedding:
  type: "CNN"
  n_layers: 1
  # Only CNN
  kernel_size: 9
  # n kernels (CNN) | n lstm blocks (LSTM) | d model (Transformer)
  n_units: 32
  # Enhanced CNN
  kernel_sizes: [9, 24, 48, 64]
  n_conv_blocks: 1
  use_residual: False
  use_squeeze_excitation: False
  use_depthwise_separable: False
  pooling_method: "max"
  # Transformer
  n_heads: 4
  dropout: 0.1
attention:
  n_layers: 2
  n_units: 32
output:
  n_layers: 1
  n_units: 32
